const displayCols = ["Course", "Time", "Horse", "Dist", "Class", "Run", "Odds", "Perc", "DildexRank", "Dildex"];
const dildexMax = 1.0;

function interpolateColor(c1, c2, t) {
    const r = Math.round(c1[0] + (c2[0] - c1[0]) * t);
    const g = Math.round(c1[1] + (c2[1] - c1[1]) * t);
    const b = Math.round(c1[2] + (c2[2] - c1[2]) * t);
    return `rgb(${r}, ${g}, ${b})`;
}

function dildexColor(value) {
    const blue = [31, 78, 121];
    const grey = [240, 240, 240];
    const red = [130, 20, 20];
    const v = Math.max(0, Math.min(dildexMax, value));
    if (v <= 1.5) return interpolateColor(blue, grey, v / 1.5);
    return interpolateColor(grey, red, (v - 1.5) / 1.5);
}

function renderDildex(value) {
    const num = parseFloat(value);
    if (isNaN(num)) return "";
    const clipped = Math.max(0, Math.min(dildexMax, num));
    const pct = (clipped / dildexMax) * 100;
    const color = dildexColor(clipped);
    return `<div class="dildex-wrap"><div class="dildex-bar-bg"><div class="dildex-bar" style="width: ${pct}%; background: ${color};"></div></div><div class="dildex-value">${num.toFixed(3)}</div></div>`;
}

function getPercRange() {
    const minInput = document.getElementById("percMin");
    const maxInput = document.getElementById("percMax");
    let minPerc = parseInt(minInput.value, 10);
    let maxPerc = parseInt(maxInput.value, 10);

    if (minPerc > maxPerc) {
        if (document.activeElement === minInput) maxPerc = minPerc;
        else minPerc = maxPerc;
    }

    minInput.value = minPerc;
    maxInput.value = maxPerc;
    document.getElementById("percText").textContent = `${minPerc} - ${maxPerc}`;
    return [minPerc, maxPerc];
}

function renderTable() {
    const selected = Array.from(document.getElementById("raceSelect").selectedOptions).map(o => o.value);
    const [minPerc, maxPerc] = getPercRange();
    const tbody = document.querySelector("#raceTable tbody");
    tbody.innerHTML = "";

    const filteredRows = rows.filter(row => {
        const raceOk = selected.length === 0 || selected.includes(row.race_filter);
        const perc = parseFloat(row.Perc);
        const percOk = isNaN(perc) ? minPerc === 0 && maxPerc === 100 : perc >= minPerc && perc <= maxPerc;
        return raceOk && percOk;
    });

    let currentRace = null;
    let raceIndex = -1;

    filteredRows.forEach(row => {
        if (row.race_filter !== currentRace) {
            currentRace = row.race_filter;
            raceIndex += 1;
        }

        const tr = document.createElement("tr");
        tr.className = raceIndex % 2 === 0 ? "race-even" : "race-odd";

        displayCols.forEach(col => {
            const td = document.createElement("td");
            td.classList.add(`col-${col}`);

            if (col === "Dildex") {
                td.innerHTML = renderDildex(row[col]);
            } else {
                td.textContent = row[col];
                if (!isNaN(parseFloat(row[col])) && isFinite(row[col])) td.classList.add("num");
            }

            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

function clearFilter() {
    const select = document.getElementById("raceSelect");
    Array.from(select.options).forEach(option => option.selected = false);
    renderTable();
}

document.getElementById("raceSelect").addEventListener("change", renderTable);
document.getElementById("percMin").addEventListener("input", renderTable);
document.getElementById("percMax").addEventListener("input", renderTable);
renderTable();
</script>
