    return `rgb(${r}, ${g}, ${b})`;
}

function jetColor(value) {
    const scaleMin = 0.2;
    const scaleMax = 0.8;

    const anchors = [
        { t: 0.00, c: [0, 0, 140] },
        { t: 0.20, c: [0, 180, 255] },
        { t: 0.40, c: [0, 180, 0] },
        { t: 0.60, c: [255, 235, 0] },
        { t: 0.80, c: [255, 130, 0] },
        { t: 1.00, c: [190, 0, 0] }
    ];

    const clipped = Math.max(scaleMin, Math.min(scaleMax, value));
    const t = (clipped - scaleMin) / (scaleMax - scaleMin);

    for (let i = 0; i < anchors.length - 1; i++) {
        if (t >= anchors[i].t && t <= anchors[i + 1].t) {
            const localT = (t - anchors[i].t) / (anchors[i + 1].t - anchors[i].t);
            return interpolateColor(anchors[i].c, anchors[i + 1].c, localT);
        }
    }

    return "rgb(" + anchors[anchors.length - 1].c.join(",") + ")";
}

function renderDildex(value) {
    const displayNum = parseFloat(value);

    if (isNaN(displayNum)) {
        return "";
    }

    const num = displayNum / 1000;
    const clipped = Math.max(0, Math.min(dildexMax, num));
    const pct = (clipped / dildexMax) * 100;
    const color = jetColor(num);

    return `
        <div class="dildex-wrap">
            <div class="dildex-bar-bg">
                <div
                    class="dildex-bar"
                    style="width: ${pct}%; background: ${color};"
                ></div>
            </div>
            <div class="dildex-value">
                ${displayNum.toFixed(0)}
            </div>
        </div>
    `;
}

function getPercRange() {
    const minInput = document.getElementById("percMin");
    const maxInput = document.getElementById("percMax");

    let minPerc = parseInt(minInput.value, 10);
    let maxPerc = parseInt(maxInput.value, 10);

    if (minPerc > maxPerc) {
        if (document.activeElement === minInput) {
            maxPerc = minPerc;
        } else {
            minPerc = maxPerc;
        }
    }

    minInput.value = minPerc;
    maxInput.value = maxPerc;
    document.getElementById("percText").textContent = `${minPerc} - ${maxPerc}`;

    return [minPerc, maxPerc];
}

function getPcRange() {
    const minInput = document.getElementById("pcMin");
    const maxInput = document.getElementById("pcMax");

    let minPc = parseInt(minInput.value, 10);
    let maxPc = parseInt(maxInput.value, 10);

    if (minPc > maxPc) {
        if (document.activeElement === minInput) {
            maxPc = minPc;
        } else {
            minPc = maxPc;
        }
    }

    minInput.value = minPc;
    maxInput.value = maxPc;
    document.getElementById("pcText").textContent = `${minPc} - ${maxPc}`;

    return [minPc, maxPc];
}

function renderSpecialWinCell(td, value) {
    const num = parseFloat(value);

    if (!isNaN(num) && num > 0) {
        td.textContent = Number.isInteger(num) ? num.toFixed(0) : num.toString();
        td.classList.add("win-count");
    } else {
        td.textContent = "";
    }
}

function renderTable() {
    const selected = Array.from(
        document.getElementById("raceSelect").selectedOptions
    ).map(option => option.value);

    const selectedRaceGroups = Array.from(
        document.getElementById("raceGroupSelect").selectedOptions
    ).map(option => option.value);

    const [minPerc, maxPerc] = getPercRange();
    const [minPc, maxPc] = getPcRange();
    const topDildexOnly = document.getElementById("topDildexOnly").checked;
    const topHJTOnly = document.getElementById("topHJTOnly").checked;

    const tbody = document.querySelector("#raceTable tbody");
    tbody.innerHTML = "";

    const filteredRows = rows.filter(row => {
        const raceOk = (
            selected.length === 0
            || selected.includes(row.race_filter)
        );

        const raceGroupOk = (
            selectedRaceGroups.length === 0
            || selectedRaceGroups.includes(row.RaceGroup)
        );

        const perc = parseFloat(row.Perc);

        const percOk = isNaN(perc)
            ? minPerc === 0 && maxPerc === 100
            : perc >= minPerc && perc <= maxPerc;

        const pc = parseFloat(row.PlaceChance);

        const pcOk = isNaN(pc)
            ? minPc === 0 && maxPc === 100
            : pc >= minPc && pc <= maxPc;

        const dildexRank = parseFloat(row.DildexRank);

        const topDildexOk = (
            !topDildexOnly
            || dildexRank === 1
        );

        const hjtRank = parseFloat(row.H_JT_Rank);

        const topHJTOk = (
            !topHJTOnly
            || hjtRank === 1
        );

        return (
            raceOk
            && raceGroupOk
            && percOk
            && pcOk
            && topDildexOk
            && topHJTOk
        );
    });

    let currentRace = null;
    let raceIndex = -1;

    filteredRows.forEach(row => {
        if (row.race_filter !== currentRace) {
            currentRace = row.race_filter;
            raceIndex += 1;
        }

        const tr = document.createElement("tr");

        tr.className = (
            raceIndex % 2 === 0
            ? "race-even"
            : "race-odd"
        );

        displayCols.forEach(col => {
            const td = document.createElement("td");
            td.classList.add(`col-${col}`);

            if (col === "Dildex") {
                td.innerHTML = renderDildex(row[col]);
            } else if (col === "Course_Win" || col === "Distance_Win") {
                renderSpecialWinCell(td, row[col]);
            } else {
                td.textContent = row[col];

                if (
                    !isNaN(parseFloat(row[col]))
                    && isFinite(row[col])
                ) {
                    td.classList.add("num");
                }
            }

            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

function clearFilter() {
    const raceSelect = document.getElementById("raceSelect");
    const raceGroupSelect = document.getElementById("raceGroupSelect");

    Array.from(raceSelect.options).forEach(option => {
        option.selected = false;
    });

    Array.from(raceGroupSelect.options).forEach(option => {
        option.selected = false;
    });

    renderTable();
}

document.getElementById("raceSelect").addEventListener("change", renderTable);
document.getElementById("raceGroupSelect").addEventListener("change", renderTable);
document.getElementById("percMin").addEventListener("input", renderTable);
document.getElementById("percMax").addEventListener("input", renderTable);
document.getElementById("pcMin").addEventListener("input", renderTable);
document.getElementById("pcMax").addEventListener("input", renderTable);
document.getElementById("topDildexOnly").addEventListener("change", renderTable);
document.getElementById("topHJTOnly").addEventListener("change", renderTable);

renderTable();
</script>
