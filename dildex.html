<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Horses</title>
  <style>
    :root {
      --sidebar-width: 84px;
      --bg: #f5f6f8;
      --sidebar: #111827;
      --sidebar-border: #263244;
      --text: #111827;
      --muted: #6b7280;
      --active: #ffffff;
      --active-bg: #2563eb;
      --hover-bg: #1f2937;
      --focus: #93c5fd;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      height: 100%;
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 6px;
      background: var(--sidebar);
      border-right: 1px solid var(--sidebar-border);
    }

    .sidebar-title {
      margin: 0 2px 10px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 0 7px;
      background: transparent;
      color: #d1d5db;
      cursor: pointer;
      font: inherit;
      text-align: left;
    }

    .nav-button:hover {
      background: var(--hover-bg);
      color: var(--active);
    }

    .nav-button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .nav-button[aria-current="page"] {
      background: var(--active-bg);
      color: var(--active);
    }

    .content {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #ffffff;
    }

    .viewer {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .status {
      position: absolute;
      right: 14px;
      bottom: 12px;
      max-width: min(420px, calc(100% - 28px));
      border-radius: 6px;
      padding: 7px 10px;
      background: rgba(17, 24, 39, 0.82);
      color: #ffffff;
      font-size: 13px;
      line-height: 1.3;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .status.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .auth-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #111827;
    }

    .auth-screen.is-hidden {
      display: none;
    }

    .auth-box {
      width: min(320px, 100%);
      border-radius: 8px;
      padding: 18px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .auth-box h2 {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.2;
    }

    .auth-box label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .auth-box input {
      width: 100%;
      height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 0 10px;
      font: inherit;
    }

    .auth-box button {
      width: 100%;
      height: 36px;
      margin-top: 12px;
      border: 0;
      border-radius: 6px;
      background: var(--active-bg);
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .auth-error {
      min-height: 18px;
      margin-top: 8px;
      color: #b91c1c;
      font-size: 13px;
    }
    @media (max-width: 720px) {
      :root {
        --sidebar-width: 84px;
      }

      .sidebar {
        padding: 14px 6px;
      }

      .sidebar-title {
        font-size: 15px;
      }

      .nav-button {
        min-height: 42px;
        padding: 0 7px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-screen" id="authScreen">
    <form class="auth-box" id="authForm">
      <h2>Dildex v2</h2>
      <label for="authPassword">Password</label>
      <input id="authPassword" type="password" autocomplete="current-password" autofocus>
      <button type="submit">Enter</button>
      <div class="auth-error" id="authError" aria-live="polite"></div>
    </form>
  </div>

  <main class="shell">
    <nav class="sidebar" aria-label="Race views">
      <h1 class="sidebar-title">Dildex v2</h1>
      <div class="nav-list">
        <button class="nav-button" type="button" data-view="card">Card</button>
        <button class="nav-button" type="button" data-view="scatter">Scatter</button>
        <button class="nav-button" type="button" data-view="favourites">Fav</button>
      </div>
    </nav>
    <section class="content">
      <iframe class="viewer" id="viewer" title="Selected race view"></iframe>
      <div class="status" id="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const views = {
      card: {
        label: "Card",
        url: "https://richsdixon.github.io/horses/todays_races.html"
      },
      scatter: {
        label: "Scatter",
        url: "https://richsdixon.github.io/horses/dildex_scatter_today.html"
      },
      favourites: {
        label: "Favourites",
        url: "https://richsdixon.github.io/horses/favourites.html"
      }
    };

    const viewer = document.getElementById("viewer");
    const status = document.getElementById("status");
    const buttons = Array.from(document.querySelectorAll(".nav-button"));
    const authScreen = document.getElementById("authScreen");
    const authForm = document.getElementById("authForm");
    const authPassword = document.getElementById("authPassword");
    const authError = document.getElementById("authError");
    const passwordHash = "2213d541f08df2e2f3d8b47c21de88d09784310d25c4075d508d52135ced01bd";
    let isUnlocked = sessionStorage.getItem("dildexUnlocked") === passwordHash;
    let statusTimer;

    function cacheBustedUrl(rawUrl) {
      const url = new URL(rawUrl, window.location.href);
      url.searchParams.set("refresh", Date.now().toString());
      return url.toString();
    }

    function showStatus(message) {
      clearTimeout(statusTimer);
      status.textContent = message;
      status.classList.add("is-visible");
      statusTimer = window.setTimeout(() => {
        status.classList.remove("is-visible");
      }, 1800);
    }

    function setActiveButton(viewName) {
      buttons.forEach((button) => {
        const isActive = button.dataset.view === viewName;
        button.setAttribute("aria-current", isActive ? "page" : "false");
      });
    }

    function loadView(viewName) {
      if (!isUnlocked) return;
      const view = views[viewName] || views.card;
      setActiveButton(viewName);
      viewer.src = cacheBustedUrl(view.url);
      window.history.replaceState(null, "", `#${viewName}`);
      showStatus(`${view.label} refreshed`);
    }

    async function hashText(value) {
      const data = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, "0")).join("");
    }

    function unlock(initialViewName) {
      isUnlocked = true;
      sessionStorage.setItem("dildexUnlocked", passwordHash);
      authScreen.classList.add("is-hidden");
      loadView(initialViewName);
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => loadView(button.dataset.view));
    });

    const initialView = window.location.hash.slice(1);
    const initialViewName = views[initialView] ? initialView : "card";
    setActiveButton(initialViewName);

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const enteredHash = await hashText(authPassword.value);
      if (enteredHash === passwordHash) {
        authError.textContent = "";
        unlock(initialViewName);
      } else {
        authError.textContent = "Incorrect password";
        authPassword.value = "";
        authPassword.focus();
      }
    });

    if (isUnlocked) {
      unlock(initialViewName);
    } else {
      authPassword.focus();
    }
  </script>
</body>
</html>
