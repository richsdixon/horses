const gd = document.getElementById('c341db4a-42e9-4294-9649-49bd9f056995');
const activeGroups = {};
const activeSymbols = {};

gd.data.forEach(trace => {
    const meta = trace.meta || {};
    if (meta.role === "point_legend") activeGroups[meta.point_group] = true;
    if (meta.role === "symbol_legend") activeSymbols[meta.symbol] = true;
});

function refreshVisibility() {
    const dataIdx = [];
    const dataVisible = [];
    const legendIdx = [];
    const legendOpacity = [];

    gd.data.forEach((trace, idx) => {
        const meta = trace.meta || {};

        if (meta.role === "data") {
            const isVisible = activeGroups[meta.point_group] && activeSymbols[meta.symbol];
            dataIdx.push(idx);
            dataVisible.push(isVisible ? true : "legendonly");
        }

        if (meta.role === "point_legend") {
            legendIdx.push(idx);
            legendOpacity.push(activeGroups[meta.point_group] ? 1 : 0.25);
        }

        if (meta.role === "symbol_legend") {
            legendIdx.push(idx);
            legendOpacity.push(activeSymbols[meta.symbol] ? 1 : 0.25);
        }
    });

    if (dataIdx.length) Plotly.restyle(gd, {visible: dataVisible}, dataIdx);
    if (legendIdx.length) Plotly.restyle(gd, {opacity: legendOpacity}, legendIdx);
}

gd.on("plotly_legendclick", eventData => {
    const trace = gd.data[eventData.curveNumber];
    const meta = trace.meta || {};

    if (meta.role === "point_legend") {
        activeGroups[meta.point_group] = !activeGroups[meta.point_group];
        refreshVisibility();
        return false;
    }

    if (meta.role === "symbol_legend") {
        activeSymbols[meta.symbol] = !activeSymbols[meta.symbol];
        refreshVisibility();
        return false;
    }

    return true;
});

gd.on("plotly_legenddoubleclick", () => false);
